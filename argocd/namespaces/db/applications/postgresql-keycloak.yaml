apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  destination:
    server: https://kubernetes.default.svc
    namespace: db
  source:
    repoURL: https://github.com/max-pfeiffer/proxmox-talos-opentofu.git # todo: adjust to your repo URL
    targetRevision: "main"
    path: "argocd/applications/postgresql-keycloak"
